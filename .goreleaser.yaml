version: 2
project_name: agentdash
builds:
  - main: ./cmd/agentdash
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags: ["-s -w -X main.version={{.Version}}"]
    binary: agentdash
archives:
  - formats: [binary]
    name_template: "agentdash-{{ .Os }}-{{ .Arch }}"
checksum:
  name_template: checksums.txt
brews:
  - repository: {owner: yrstm, name: agentdash}
    directory: Formula
    homepage: https://github.com/yrstm/agentdash
    description: "w for your AI agents"
    license: MIT
