# Builds and publishes the static binaries (goreleaser: linux amd64/arm64,
# checksums, brew formula) on every v* tag push.
name: release
on:
  push:
    tags: ["v0.*"]  # 0.x line only; a v1.x tag is a retraction shim, not a release

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
